<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新規収蔵 | タダオの道具箱</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #FFFFFF;
    --wall: #FAF9F7;
    --ink: #1B1B1B;
    --sub: #6E6A63;
    --hairline: #E8E6E1;
    --seal: #B5342A;
    --mincho: "Shippori Mincho", "Hiragino Mincho ProN", serif;
    --gothic: "Zen Kaku Gothic New", "Hiragino Kaku Gothic ProN", sans-serif;
    --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation: none !important; transition: none !important; }
  }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: var(--gothic);
    font-size: 15px;
    line-height: 1.8;
    -webkit-font-smoothing: antialiased;
  }
  :focus-visible { outline: 2px solid var(--seal); outline-offset: 2px; }

  .wrap {
    max-width: 640px;
    margin: 0 auto;
    padding: 64px 24px 96px;
  }
  .eyebrow {
    font-size: 11px;
    letter-spacing: 0.42em;
    color: var(--sub);
    text-transform: uppercase;
    margin-bottom: 18px;
  }
  h1 {
    font-family: var(--mincho);
    font-weight: 600;
    font-size: 30px;
    letter-spacing: 0.12em;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
  }
  .seal {
    width: 26px; height: 26px;
    background: var(--seal);
    color: #fff;
    font-family: var(--mincho);
    font-size: 15px;
    font-weight: 700;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 3px;
    transform: rotate(-4deg);
  }
  .lede { color: var(--sub); font-size: 13px; margin-bottom: 40px; }
  .lede a { color: var(--sub); }

  .field { margin-bottom: 26px; }
  label {
    display: block;
    font-size: 12px;
    letter-spacing: 0.16em;
    color: var(--sub);
    margin-bottom: 8px;
  }
  label .req { color: var(--seal); margin-left: 4px; }
  label .hint {
    display: block;
    letter-spacing: 0.04em;
    font-size: 11.5px;
    color: #B8B4AC;
    margin-top: 2px;
  }
  input[type="text"], input[type="url"], input[type="password"], select, textarea {
    width: 100%;
    border: 1px solid var(--hairline);
    background: var(--paper);
    font-family: inherit;
    font-size: 14.5px;
    line-height: 1.7;
    padding: 11px 14px;
    border-radius: 2px;
    color: var(--ink);
    transition: border-color .15s;
  }
  textarea { min-height: 110px; resize: vertical; }
  textarea.code { font-family: var(--mono); font-size: 13px; }
  input:focus, select:focus, textarea:focus { border-color: var(--ink); outline: none; }

  /* 種類セレクタ：4枚のプレートから選ぶ */
  .typegrid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  .typegrid input { position: absolute; opacity: 0; pointer-events: none; }
  .typegrid label.plate {
    border: 1px solid var(--hairline);
    text-align: center;
    padding: 12px 4px;
    font-size: 13px;
    letter-spacing: 0.06em;
    color: var(--sub);
    cursor: pointer;
    margin: 0;
    border-radius: 2px;
    transition: border-color .15s, color .15s;
  }
  .typegrid input:checked + label.plate {
    border-color: var(--seal);
    color: var(--seal);
    font-weight: 700;
  }
  .typegrid input:focus-visible + label.plate { outline: 2px solid var(--seal); outline-offset: 2px; }

  .divider {
    border: none;
    border-top: 1px solid var(--hairline);
    margin: 36px 0;
  }

  .submitrow {
    display: flex;
    align-items: center;
    gap: 18px;
    margin-top: 8px;
  }
  .submitbtn {
    font-family: inherit;
    border: 1px solid var(--ink);
    background: var(--ink);
    color: #fff;
    font-size: 13.5px;
    letter-spacing: 0.18em;
    padding: 13px 38px;
    border-radius: 2px;
    cursor: pointer;
    transition: background .15s, border-color .15s;
  }
  .submitbtn:hover { background: var(--seal); border-color: var(--seal); }
  .submitbtn:disabled { background: #B8B4AC; border-color: #B8B4AC; cursor: wait; }

  .result {
    margin-top: 26px;
    padding: 16px 18px;
    border-radius: 2px;
    font-size: 13.5px;
    display: none;
  }
  .result.ok {
    display: block;
    background: var(--wall);
    border: 1px solid var(--hairline);
  }
  .result.ok .no {
    font-family: var(--mono);
    color: var(--seal);
    font-weight: 700;
  }
  .result.ng {
    display: block;
    background: #FBF1F0;
    border: 1px solid #E8C5C1;
    color: #8A2820;
  }
</style>
</head>
<body>
<div class="wrap">
  <p class="eyebrow">New Acquisition</p>
  <h1>新規収蔵<span class="seal" aria-hidden="true">道</span></h1>
  <p class="lede">道具箱に新しいアイテムを追加します。送信には合言葉が必要です。<a href="./index.html">← 展示室にもどる</a></p>

  <div class="field">
    <label>種類<span class="req">＊</span></label>
    <div class="typegrid" role="radiogroup" aria-label="種類">
      <input type="radio" name="type" value="prompt" id="t-prompt" checked>
      <label class="plate" for="t-prompt">プロンプト</label>
      <input type="radio" name="type" value="gas" id="t-gas">
      <label class="plate" for="t-gas">GAS</label>
      <input type="radio" name="type" value="webapp" id="t-webapp">
      <label class="plate" for="t-webapp">Webアプリ</label>
      <input type="radio" name="type" value="manga" id="t-manga">
      <label class="plate" for="t-manga">マンガ</label>
    </div>
  </div>

  <div class="field">
    <label for="f-title">タイトル<span class="req">＊</span></label>
    <input type="text" id="f-title" placeholder="例：DAOちゃん 喫茶店プロンプト">
  </div>

  <div class="field">
    <label for="f-desc">説明<span class="hint">どんな場面向きか、ハマったポイント（原因→対策）などもここに</span></label>
    <textarea id="f-desc"></textarea>
  </div>

  <div class="field">
    <label for="f-content">本文<span class="hint">プロンプト本文、またはGASのコード。コピーボタンの対象になります</span></label>
    <textarea id="f-content" class="code"></textarea>
  </div>

  <div class="field">
    <label for="f-url">リンク<span class="hint">Webアプリや公開ページのURL（なければ空欄でOK）</span></label>
    <input type="url" id="f-url" placeholder="https://">
  </div>

  <div class="field">
    <label for="f-images">画像<span class="hint">Driveの共有リンクをそのまま貼ってOK（1行に1つで複数可）。表示用URLへの変換は自動で行われます</span></label>
    <textarea id="f-images" class="code" placeholder="https://drive.google.com/file/d/xxxx/view?usp=sharing"></textarea>
  </div>

  <div class="field">
    <label for="f-tags">タグ<span class="hint">カンマ区切り。例：#DAOちゃん,#プロンプト</span></label>
    <input type="text" id="f-tags">
  </div>

  <hr class="divider">

  <div class="field">
    <label for="f-secret">合言葉<span class="req">＊</span></label>
    <input type="password" id="f-secret" autocomplete="off">
  </div>

  <div class="submitrow">
    <button class="submitbtn" id="submitBtn">収蔵する</button>
  </div>

  <div class="result" id="result" role="status"></div>
</div>

<script>
// ================= 設定 =================
const API_URL = 'https://script.google.com/macros/s/AKfycbzcPEbKXk8jthyQkEogZlgRV19X2yg77km7zlsBqoljkPiv_EYFDDcRbagaxayWwETs5Q/exec';

const btn = document.getElementById('submitBtn');
const result = document.getElementById('result');

btn.addEventListener('click', async () => {
  const payload = {
    secret: document.getElementById('f-secret').value,
    type: document.querySelector('input[name="type"]:checked').value,
    title: document.getElementById('f-title').value.trim(),
    description: document.getElementById('f-desc').value.trim(),
    content: document.getElementById('f-content').value,
    url: document.getElementById('f-url').value.trim(),
    images: document.getElementById('f-images').value.trim(),
    tags: document.getElementById('f-tags').value.trim()
  };

  // 送信前の簡単なチェック
  if (!payload.title) { return showResult(false, 'タイトルを入力してください'); }
  if (!payload.secret) { return showResult(false, '合言葉を入力してください'); }

  btn.disabled = true;
  btn.textContent = '収蔵中…';
  result.className = 'result';

  try {
    // CORS回避のためtext/plainで送信（GAS連携の定石）
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload)
    });
    const data = await res.json();

    if (data.ok) {
      showResult(true, '<span class="no">No.' + String(data.id).padStart(3, '0') + '</span> として収蔵しました。展示室を再読み込みすると表示されます。');
      clearForm();
    } else {
      showResult(false, '収蔵できませんでした：' + (data.error || '原因不明のエラー'));
    }
  } catch (e) {
    showResult(false, '通信エラーです。ネット接続と、GASのデプロイ設定（アクセス：全員）を確認してください。');
  }

  btn.disabled = false;
  btn.textContent = '収蔵する';
});

function showResult(ok, html) {
  result.className = 'result ' + (ok ? 'ok' : 'ng');
  result.innerHTML = html;
}

function clearForm() {
  ['f-title', 'f-desc', 'f-content', 'f-url', 'f-images', 'f-tags'].forEach(id => {
    document.getElementById(id).value = '';
  });
  // 合言葉は連続投稿しやすいよう残します
}
</script>
</body>
</html>
