<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>マンガタクティクス 〜スキル習得SRPG〜</title>
<style>
  :root {
    --gold: #d8b56c;
    --gold-bright: #f0d89a;
    --ivory: #f2ecd8;
    --ivory-dim: #b8b09a;
    --navy1: #2a3252;
    --navy2: #1a2038;
    --navy3: #12172a;
    --hp: #6cd984;
    --dmg: #ff6b6b;
    --cyan: #7fd8e8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { background: #0d1020; }
  body {
    font-family: "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
    background:
      radial-gradient(ellipse at 50% -10%, #232b4d 0%, #0d1020 60%),
      #0d1020;
    color: var(--ivory);
    min-height: 100vh;
    padding-bottom: 60px;
  }
  .serif { font-family: "Hiragino Mincho ProN", "Yu Mincho", "YuMincho", serif; }
  .wrap { max-width: 900px; margin: 0 auto; padding: 16px; }

  /* ===== FFT風パネル共通 ===== */
  .fpanel {
    background: linear-gradient(170deg, var(--navy1) 0%, var(--navy2) 55%, var(--navy3) 100%);
    border: 2px solid var(--gold);
    border-radius: 8px;
    box-shadow:
      inset 0 0 0 1px rgba(255, 245, 210, 0.18),
      inset 0 14px 30px rgba(255, 255, 255, 0.05),
      0 6px 18px rgba(0, 0, 0, 0.55);
    padding: 16px 18px;
  }
  .fpanel h2 {
    font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
    font-size: 16px; letter-spacing: 3px; color: var(--gold-bright);
    margin-bottom: 8px;
    text-shadow: 0 1px 3px rgba(0,0,0,0.6);
  }
  .fpanel .desc { font-size: 12px; color: var(--ivory-dim); line-height: 1.8; margin-bottom: 12px; }

  /* ===== タイトルヘッダー ===== */
  header.top { text-align: center; padding: 18px 0 14px; }
  header.top h1 {
    font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
    font-size: 34px; letter-spacing: 6px;
    background: linear-gradient(180deg, #fdf3d0 0%, #e8c268 45%, #9a7226 75%, #f0d89a 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.7));
  }
  header.top .sub {
    font-size: 12px; letter-spacing: 4px; color: var(--ivory-dim); margin-top: 4px;
  }
  .save-row {
    display: flex; justify-content: center; gap: 26px; margin-top: 10px; font-size: 13px;
    color: var(--ivory-dim);
  }
  .save-row b { color: var(--gold-bright); font-size: 16px; }

  /* ===== ステージ選択 ===== */
  .stage-list { display: flex; flex-direction: column; gap: 10px; }
  .stage-card {
    display: flex; align-items: center; gap: 14px;
    border: 2px solid rgba(216, 181, 108, 0.55);
    border-radius: 8px; padding: 10px 14px;
    background: linear-gradient(90deg, rgba(255,255,255,0.05), rgba(0,0,0,0.15));
    transition: border-color 0.15s, transform 0.1s;
  }
  .stage-card:not(.locked):hover { border-color: var(--gold-bright); transform: translateX(3px); }
  .stage-card.locked { opacity: 0.42; filter: grayscale(0.6); }
  .stage-thumb {
    width: 74px; height: 52px; border-radius: 5px; flex: none;
    border: 1px solid rgba(240, 216, 154, 0.6);
    display: flex; align-items: center; justify-content: center; font-size: 24px;
    box-shadow: inset 0 0 12px rgba(0,0,0,0.35);
  }
  .stage-body { flex: 1; min-width: 0; }
  .stage-body .sname {
    font-family: "Hiragino Mincho ProN", serif;
    font-size: 15px; letter-spacing: 2px; color: var(--gold-bright); margin-bottom: 2px;
  }
  .stage-body .sinfo { font-size: 11.5px; color: var(--ivory-dim); line-height: 1.6; }
  .gbtn {
    font-family: "Hiragino Mincho ProN", serif;
    font-size: 13px; font-weight: bold; letter-spacing: 2px;
    padding: 9px 22px; border-radius: 6px; cursor: pointer; flex: none;
    color: #241a06;
    background: linear-gradient(180deg, #f7e6b2 0%, #d8b56c 55%, #b08c42 100%);
    border: 1px solid #6d5522;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.7), 0 3px 8px rgba(0,0,0,0.5);
    text-shadow: 0 1px 0 rgba(255,255,255,0.35);
  }
  .gbtn:hover { filter: brightness(1.1); }
  .gbtn:active { transform: translateY(1px); }
  .gbtn:disabled { filter: grayscale(1) brightness(0.7); cursor: not-allowed; }
  .gbtn.blue {
    color: #eaf4ff;
    background: linear-gradient(180deg, #5a7ab8 0%, #35507e 55%, #24365c 100%);
    border-color: #1a2745; text-shadow: 0 1px 2px rgba(0,0,0,0.6);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.25), 0 3px 8px rgba(0,0,0,0.5);
  }
  .clear-mark { color: var(--gold-bright); font-size: 17px; margin-right: 4px; }

  .party-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .party-chip {
    flex: 1; min-width: 210px; display: flex; gap: 12px; align-items: flex-start;
    border: 1px solid rgba(216,181,108,0.45); border-radius: 8px;
    padding: 10px 12px; background: rgba(0,0,0,0.22); font-size: 11.5px;
    color: var(--ivory-dim); line-height: 1.7;
  }
  .portrait {
    width: 46px; height: 46px; flex: none; margin: 4px 6px 0 2px;
    transform: rotate(45deg); border: 2px solid var(--gold);
    border-radius: 6px;
    background: radial-gradient(circle at 35% 30%, #46548a, #222c50);
    box-shadow: inset 0 0 0 1px rgba(255,245,210,0.25), 0 3px 8px rgba(0,0,0,0.5);
    display: flex; align-items: center; justify-content: center;
  }
  .portrait span { transform: rotate(-45deg); font-size: 24px; }
  .party-chip .pname { color: var(--ivory); font-size: 13.5px; font-weight: bold; }
  .party-chip .pjob { color: var(--gold-bright); font-size: 11px; letter-spacing: 1px; }

  .mb14 { margin-bottom: 14px; }
  footer { text-align: center; font-size: 11px; color: #565d75; margin-top: 18px; }
  .reset-link { color: #565d75; text-decoration: underline; cursor: pointer; background: none; border: none; font-size: 11px; font-family: inherit; }

  /* ===== バトル画面 ===== */
  .battle-head {
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    padding: 10px 16px; margin-bottom: 12px;
  }
  .battle-head .bname { font-size: 16px; letter-spacing: 3px; color: var(--gold-bright); }
  .battle-head .turn { font-size: 12.5px; color: var(--ivory-dim); }
  .battle-head .spacer { flex: 1; }
  .sbtn {
    font-family: inherit; font-size: 12px; letter-spacing: 1px;
    padding: 6px 16px; border-radius: 5px; cursor: pointer;
    background: rgba(0,0,0,0.3); color: var(--ivory);
    border: 1px solid rgba(216,181,108,0.6);
  }
  .sbtn:hover { background: rgba(216,181,108,0.18); }

  /* ===== アイソメトリック戦場 ===== */
  .scene-outer {
    border: 2px solid var(--gold); border-radius: 10px;
    box-shadow: inset 0 0 0 1px rgba(255,245,210,0.18), 0 8px 24px rgba(0,0,0,0.6);
    overflow: hidden; margin-bottom: 14px;
    overflow-x: auto;
  }
  .scene {
    position: relative; width: 800px; height: 545px; margin: 0 auto;
  }
  /* 章ごとの空 */
  .scene.theme-0 { background: linear-gradient(180deg, #a8cfe8 0%, #d8e2d8 45%, #ead9b0 78%, #d8c495 100%); }
  .scene.theme-1 { background: linear-gradient(180deg, #274b46 0%, #3c6b58 45%, #6f9468 80%, #4c6b48 100%); }
  .scene.theme-2 { background: linear-gradient(180deg, #f0a35e 0%, #e07040 40%, #9c4a4a 80%, #6e3a4a 100%); }
  .scene.theme-3 { background: linear-gradient(180deg, #3a1620 0%, #6e2222 45%, #b8452a 85%, #7e2e1e 100%); }
  .scene.theme-4 { background: linear-gradient(180deg, #0c0c22 0%, #1e1a3e 50%, #3a2a5c 85%, #2a1e44 100%); }

  .cloud {
    position: absolute; border-radius: 50%; filter: blur(16px);
    background: rgba(255,255,255,0.55); pointer-events: none;
  }
  .scene.theme-3 .cloud { background: rgba(255,120,60,0.25); }
  .scene.theme-4 .cloud { background: rgba(160,140,255,0.14); }
  .cloud.c1 { width: 220px; height: 44px; top: 36px; left: -80px; animation: drift1 70s linear infinite; }
  .cloud.c2 { width: 150px; height: 32px; top: 84px; left: 300px; animation: drift2 95s linear infinite; }
  @keyframes drift1 { from { transform: translateX(0); } to { transform: translateX(900px); } }
  @keyframes drift2 { from { transform: translateX(0); } to { transform: translateX(-700px); } }
  .stars { position: absolute; inset: 0; pointer-events: none; display: none; }
  .scene.theme-4 .stars { display: block; }
  .stars::before {
    content: ""; position: absolute; width: 2px; height: 2px; border-radius: 50%;
    background: #fff; top: 40px; left: 90px;
    box-shadow: 120px 18px 0 #ffffffcc, 240px 44px 0 #ffffff88, 360px 8px 0 #fff,
      470px 60px 0 #ffffffaa, 560px 24px 0 #ffffff77, 660px 48px 0 #fff,
      40px 80px 0 #ffffff99, 300px 96px 0 #ffffffbb, 620px 100px 0 #ffffff66,
      180px 66px 0 #ffffff77, 520px 88px 0 #ffffffcc, 700px 14px 0 #ffffff99;
  }
  .glow {
    position: absolute; left: 0; right: 0; bottom: 0; height: 200px; pointer-events: none; display: none;
  }
  .scene.theme-3 .glow {
    display: block;
    background: radial-gradient(ellipse at 50% 110%, rgba(255,110,30,0.4), transparent 65%);
  }

  /* タイル */
  .tile { position: absolute; width: 92px; pointer-events: none; }
  .tile .top {
    position: relative; width: 92px; height: 46px;
    clip-path: polygon(50% 0, 100% 50%, 50% 100%, 0 50%);
    pointer-events: auto; cursor: pointer;
  }
  .tile .top .inner {
    position: absolute; inset: 1.5px;
    clip-path: polygon(50% 0, 100% 50%, 50% 100%, 0 50%);
    transition: filter 0.12s;
  }
  .tile .top:hover .inner { filter: brightness(1.18); }
  .tile .face { position: absolute; pointer-events: none; }
  .tile .faceL { top: 23px; left: 0; width: 46px; transform: skewY(26.57deg); transform-origin: top left; }
  .tile .faceR { top: 23px; left: 46px; width: 46px; transform: skewY(-26.57deg); transform-origin: top right; }

  /* 章ごとのタイル色 */
  .theme-0 .tile .top { background: #c8b98e; }
  .theme-0 .tile.alt0 .inner { background: linear-gradient(135deg, #f4edd8, #e6dcba); }
  .theme-0 .tile.alt1 .inner { background: linear-gradient(135deg, #eae0c2, #dcd0a8); }
  .theme-0 .tile .faceL { background: linear-gradient(180deg, #a6926a, #82704c); }
  .theme-0 .tile .faceR { background: linear-gradient(180deg, #c0aa7c, #98825a); }

  .theme-1 .tile .top { background: #4a6b3c; }
  .theme-1 .tile.alt0 .inner { background: linear-gradient(135deg, #86ac60, #6c9450); }
  .theme-1 .tile.alt1 .inner { background: linear-gradient(135deg, #74a054, #5c8846); }
  .theme-1 .tile .faceL { background: linear-gradient(180deg, #4c5e38, #37462a); }
  .theme-1 .tile .faceR { background: linear-gradient(180deg, #5e7444, #445634); }

  .theme-2 .tile .top { background: #7e7268; }
  .theme-2 .tile.alt0 .inner { background: linear-gradient(135deg, #c4b8a8, #a89a88); }
  .theme-2 .tile.alt1 .inner { background: linear-gradient(135deg, #b2a492, #96887a); }
  .theme-2 .tile .faceL { background: linear-gradient(180deg, #6e6256, #544a42); }
  .theme-2 .tile .faceR { background: linear-gradient(180deg, #8a7c6c, #665a50); }

  .theme-3 .tile .top { background: #52322a; }
  .theme-3 .tile.alt0 .inner { background: linear-gradient(135deg, #6e4438, #58362c); }
  .theme-3 .tile.alt1 .inner { background: linear-gradient(135deg, #623c30, #4c2e26); }
  .theme-3 .tile .faceL { background: linear-gradient(180deg, #3c2420, #2a1814); }
  .theme-3 .tile .faceR { background: linear-gradient(180deg, #4e2e26, #36201a); }

  .theme-4 .tile .top { background: #4c4270; }
  .theme-4 .tile.alt0 .inner { background: linear-gradient(135deg, #6a5c96, #544a7c); }
  .theme-4 .tile.alt1 .inner { background: linear-gradient(135deg, #5e5288, #4a4070); }
  .theme-4 .tile .faceL { background: linear-gradient(180deg, #3a3258, #282242); }
  .theme-4 .tile .faceR { background: linear-gradient(180deg, #4a4070, #342c54); }

  /* ハイライト */
  .tile .hl {
    position: absolute; inset: 0; clip-path: polygon(50% 0, 100% 50%, 50% 100%, 0 50%);
    pointer-events: none; opacity: 0; height: 46px;
  }
  .tile.move .hl { opacity: 1; background: rgba(90, 200, 235, 0.5); animation: pulse 1.1s ease-in-out infinite; }
  .tile.target .hl { opacity: 1; background: rgba(255, 80, 70, 0.55); animation: pulse 0.8s ease-in-out infinite; }
  .tile.sel .hl { opacity: 1; background: transparent; box-shadow: inset 0 0 0 3px var(--gold-bright); animation: none; }
  @keyframes pulse { 0%, 100% { opacity: 0.85; } 50% { opacity: 0.4; } }

  .tile .deco {
    position: absolute; left: 0; width: 92px; text-align: center;
    font-size: 30px; line-height: 1; top: -12px; pointer-events: none;
    filter: drop-shadow(0 4px 3px rgba(0,0,0,0.35));
  }

  /* ユニットスプライト */
  .sprite {
    position: absolute; width: 92px; height: 86px; pointer-events: none;
    transition: left 0.3s ease, top 0.3s ease, opacity 0.4s;
  }
  .sprite .ring {
    position: absolute; left: 50%; bottom: 12px; transform: translateX(-50%);
    width: 44px; height: 20px; border-radius: 50%;
  }
  .sprite.ally .ring { background: radial-gradient(ellipse, rgba(80,160,255,0.75) 0%, rgba(80,160,255,0.12) 65%, transparent 70%); }
  .sprite.foe .ring { background: radial-gradient(ellipse, rgba(255,70,60,0.72) 0%, rgba(255,70,60,0.12) 65%, transparent 70%); }
  .sprite .chara {
    position: absolute; left: 0; width: 92px; bottom: 20px; text-align: center;
    font-size: 34px; line-height: 1;
    filter: drop-shadow(0 5px 4px rgba(0,0,0,0.45));
    animation: idle 2.4s ease-in-out infinite;
  }
  .sprite.boss .chara { font-size: 48px; }
  @keyframes idle { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
  .sprite.acted .chara { filter: grayscale(1) brightness(0.75) drop-shadow(0 5px 4px rgba(0,0,0,0.45)); animation: none; }
  .sprite.hit .chara { animation: hitflash 0.4s; }
  @keyframes hitflash {
    0%, 100% { filter: drop-shadow(0 5px 4px rgba(0,0,0,0.45)); transform: translateX(0); }
    25% { filter: brightness(3) drop-shadow(0 0 10px #fff); transform: translateX(-5px); }
    60% { transform: translateX(4px); }
  }
  .sprite.dead { opacity: 0; }
  .sprite .hp {
    position: absolute; left: 24px; right: 24px; bottom: 4px; height: 6px;
    background: rgba(0,0,0,0.65); border-radius: 3px; overflow: hidden;
    border: 1px solid rgba(255,255,255,0.35);
  }
  .sprite .hp i {
    display: block; height: 100%; border-radius: 2px;
    background: linear-gradient(180deg, #a2efaf, #4cbf62);
    transition: width 0.35s;
  }
  .sprite.foe .hp i { background: linear-gradient(180deg, #ffb0a0, #e05540); }

  /* ダメージ数字 */
  .dmg-float {
    position: absolute; width: 92px; text-align: center; pointer-events: none; z-index: 999;
    font-family: "Hiragino Mincho ProN", serif; font-weight: bold; font-size: 26px;
    color: #fff;
    text-shadow: 0 0 4px #000, 2px 2px 0 #000, -2px 2px 0 #000, 2px -2px 0 #000, -2px -2px 0 #000;
    animation: dmgup 1s ease-out forwards;
  }
  .dmg-float.heal { color: #8effa8; }
  .dmg-float.crit { color: var(--gold-bright); font-size: 32px; }
  @keyframes dmgup {
    0% { opacity: 0; transform: translateY(6px) scale(0.7); }
    18% { opacity: 1; transform: translateY(-6px) scale(1.15); }
    38% { transform: translateY(-10px) scale(1); }
    100% { opacity: 0; transform: translateY(-34px) scale(1); }
  }
  .scene.shake { animation: scshake 0.35s; }
  @keyframes scshake {
    0%, 100% { transform: translate(0,0); } 20% { transform: translate(-5px,2px); }
    45% { transform: translate(4px,-2px); } 70% { transform: translate(-3px,1px); }
  }

  /* フェイズバナー */
  .banner {
    position: absolute; left: 0; right: 0; top: 42%; height: 64px; z-index: 1000;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(90deg, transparent, rgba(10,12,26,0.85) 18%, rgba(10,12,26,0.85) 82%, transparent);
    border-top: 1px solid rgba(240,216,154,0.7);
    border-bottom: 1px solid rgba(240,216,154,0.7);
    pointer-events: none;
    animation: bannerIn 1.5s ease forwards;
  }
  .banner .btext {
    font-family: "Hiragino Mincho ProN", serif; font-size: 26px; letter-spacing: 10px;
    color: var(--gold-bright); text-shadow: 0 2px 8px rgba(0,0,0,0.9);
    white-space: nowrap;
  }
  .banner .btext small { display: block; text-align: center; font-size: 11px; letter-spacing: 5px; color: var(--ivory-dim); }
  .banner.red .btext { color: #ff9080; }
  @keyframes bannerIn {
    0% { opacity: 0; transform: scaleX(0.2); }
    14% { opacity: 1; transform: scaleX(1); }
    82% { opacity: 1; }
    100% { opacity: 0; }
  }

  /* コマンド＆ステータス */
  .under-flex { display: flex; gap: 12px; align-items: stretch; flex-wrap: wrap; margin-bottom: 12px; }
  .cmd-panel { flex: 1.1; min-width: 250px; }
  .stat-panel { flex: 1; min-width: 240px; }
  .cmd-title {
    font-family: "Hiragino Mincho ProN", serif; letter-spacing: 3px;
    font-size: 13px; color: var(--gold-bright);
    border-bottom: 1px solid rgba(216,181,108,0.5); padding-bottom: 6px; margin-bottom: 8px;
  }
  .menu-item {
    display: block; width: 100%; text-align: left;
    font-family: inherit; font-size: 13.5px; color: var(--ivory);
    background: none; border: none; cursor: pointer;
    padding: 8px 10px 8px 26px; border-radius: 4px; position: relative; line-height: 1.5;
  }
  .menu-item small { color: var(--ivory-dim); font-size: 11px; }
  .menu-item:hover { background: rgba(216,181,108,0.14); }
  .menu-item:hover::before {
    content: "▶"; position: absolute; left: 8px; top: 10px; font-size: 10px; color: var(--gold-bright);
  }
  .menu-item.heal-type { color: #b8f0c0; }
  .menu-item.gray { color: var(--ivory-dim); }
  .hint { font-size: 12px; color: var(--ivory-dim); line-height: 1.9; }
  .stat-panel .uname { font-size: 15px; font-weight: bold; }
  .stat-panel .ujob { font-size: 11px; letter-spacing: 2px; color: var(--gold-bright); }
  .stat-flex { display: flex; gap: 12px; align-items: flex-start; }
  .stat-body { flex: 1; font-size: 12.5px; line-height: 1.9; color: var(--ivory-dim); }
  .stat-body b { color: var(--ivory); }
  .hp-line { display: flex; align-items: center; gap: 8px; margin: 2px 0; }
  .hp-track {
    flex: 1; height: 9px; background: rgba(0,0,0,0.5); border-radius: 5px;
    border: 1px solid rgba(255,255,255,0.25); overflow: hidden;
  }
  .hp-track i { display: block; height: 100%; background: linear-gradient(180deg, #a2efaf, #4cbf62); border-radius: 4px; transition: width 0.3s; }

  #blog { font-size: 12px; line-height: 1.9; max-height: 130px; overflow-y: auto; color: var(--ivory-dim); }
  #blog p { border-bottom: 1px dashed rgba(216,181,108,0.2); padding: 2px 0; }
  #blog p:first-child { color: var(--ivory); }

  /* ===== モーダル ===== */
  .modal-bg {
    display: none; position: fixed; inset: 0; background: rgba(4, 6, 16, 0.78);
    z-index: 2000; padding: 20px; overflow-y: auto;
  }
  .modal-bg.show { display: flex; align-items: flex-start; justify-content: center; }
  .modal {
    background: linear-gradient(170deg, var(--navy1) 0%, var(--navy2) 55%, var(--navy3) 100%);
    border: 2px solid var(--gold); border-radius: 10px;
    box-shadow: inset 0 0 0 1px rgba(255,245,210,0.18), 0 14px 40px rgba(0,0,0,0.8);
    max-width: 580px; width: 100%; padding: 26px 28px; margin-top: 36px;
    animation: mpop 0.22s ease-out;
  }
  @keyframes mpop { from { transform: scale(0.94); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .modal h3 {
    font-family: "Hiragino Mincho ProN", serif; font-size: 19px; letter-spacing: 3px;
    color: var(--gold-bright); margin-bottom: 6px;
  }
  .skill-tag {
    display: inline-block; font-size: 11.5px; letter-spacing: 1px;
    border: 1px solid rgba(216,181,108,0.7); color: var(--gold-bright);
    padding: 3px 12px; border-radius: 3px; margin-bottom: 14px;
    background: rgba(0,0,0,0.25);
  }
  .question {
    font-size: 15px; line-height: 1.8; color: var(--ivory);
    background: rgba(0,0,0,0.3); border: 1px solid rgba(216,181,108,0.3);

  }

    display: block; width: 100%; text-align: left; font-family: inherit; font-size: 14px;

  .choice-btn:hover::before { content: "▶"; position: absolute; left: 12px; top: 14px; font-size: 10px; color: var(--gold-bright); }
  .choice-btn.correct { background: rgba(76,191,98,0.22); border-color: #6cd984; color: #c8f5d0; font-weight: bold; }

  .explain .head {

  }
  .modal-footer { text-align: center; margin-top: 18px; }
  .result-big {
    text-align: center; font-family: "Hiragino Mincho ProN", serif;

<script src="quiz-data.js"></script>
<script>
"use strict";

/* ============================================================
   アビリティ（技）＝マンガスキル
============================================================ */
const ABILITIES = {
  kikaku:   { name: "企画のひらめき",     range: 1, power: 11, type: "atk" },
  story:    { name: "物語構成アタック",   range: 2, power: 9,  type: "atk" },
  kanjo:    { name: "感情設計ヒール",     range: 2, power: 12, type: "heal" },
  ochi:     { name: "どんでん返しのオチ", range: 1, power: 15, type: "atk" },
  koma:     { name: "コマ割り斬り",       range: 1, power: 11, type: "atk" },
  shisen:   { name: "視線誘導ショット",   range: 3, power: 8,  type: "atk" },
  serifu:   { name: "グサッとセリフ",     range: 1, power: 13, type: "atk" },
  enshutsu: { name: "演出の大技",         range: 2, power: 10, type: "atk" },
  sakuga:   { name: "作画パンチ",         range: 1, power: 11, type: "atk" },
  hasshin:  { name: "バズ発信ビーム",     range: 3, power: 8,  type: "atk" },
  shiage2:  { name: "仕上げリペア",       range: 2, power: 12, type: "heal" },
  check:    { name: "完成チェック一閃",   range: 1, power: 14, type: "atk" },
};

/* ============================================================
   部隊・敵・ステージ
============================================================ */
const PARTY = [
  { id: "aki",  name: "アキ", title: "設計士",     emoji: "🧠", baseHp: 32, move: 3,
    abilities: ["kikaku", "story", "kanjo", "ochi"],
    intro: "物語を組み立てる軍師。回復技「感情設計ヒール」を使える。" },
  { id: "yomi", name: "ヨミ", title: "演出家",     emoji: "👀", baseHp: 30, move: 4,
    abilities: ["koma", "shisen", "serifu", "enshutsu"],
    intro: "読者の視線を操る快足の剣士。遠距離「視線誘導ショット」が得意。" },
  { id: "shia", name: "シア", title: "仕上げ職人", emoji: "🖌️", baseHp: 34, move: 3,
    abilities: ["sakuga", "hasshin", "shiage2", "check"],
    intro: "作品を完成させる頑健な職人。「仕上げリペア」で仲間を癒やす。" },
];

const ENEMY_TYPES = {
  slime:   { name: "ネタ切れスライム", emoji: "🫠", hp: 14, atk: 5, move: 2, range: 1 },
  beast:   { name: "スランプ獣",       emoji: "👾", hp: 20, atk: 6, move: 3, range: 1 },
  golem:   { name: "締切りゴーレム",   emoji: "🗿", hp: 30, atk: 8, move: 2, range: 1 },
  phoenix: { name: "炎上フェニックス", emoji: "🔥", hp: 22, atk: 7, move: 3, range: 2 },
  king:    { name: "マンネリ大魔王",   emoji: "👹", hp: 62, atk: 9, move: 2, range: 2, boss: true },
};

const COLS = 9, ROWS = 7;
const ALLY_START = [[0, 2], [1, 3], [0, 4]];

/* heights: 各マスの高さ(0〜3)。見た目の高低差（ゲームルールには影響しない） */
const STAGES = [
  { name: "第1章 白紙の平原", deco: "🪨",
    intro: "真っ白な原稿用紙の平原に、ネタ切れスライムが湧いた。まずは小手調べだ。",
    heights: ["001112210","000111100","000011000","000001000","000011000","000111100","001112210"],
    obstacles: [[4, 1], [4, 5]],
    enemies: [["slime", 6, 2], ["slime", 6, 4]] },
  { name: "第2章 スランプの森", deco: "🌲",
    intro: "描けない、進まない…スランプの森でスランプ獣が待ち構える。木々を回り込め。",
    heights: ["112211001","011100011","001001121","000000110","001001121","011100011","112211001"],
    obstacles: [[3, 1], [3, 5], [5, 3], [6, 0], [6, 6]],
    enemies: [["slime", 5, 1], ["beast", 7, 3], ["slime", 5, 5]] },
  { name: "第3章 締切りの砦", deco: "🧱",
    intro: "迫りくる締切り。城壁の切れ目はひとつだけ。硬い締切りゴーレムに回復で対抗せよ。",
    heights: ["000022210","000122210","000022110","000000110","000022110","000122210","000022210"],
    obstacles: [[4, 0], [4, 1], [4, 2], [4, 4], [4, 5], [4, 6]],
    enemies: [["beast", 6, 1], ["golem", 7, 3], ["beast", 6, 5]] },
  { name: "第4章 炎上の火山", deco: "🌋",
    intro: "SNS大炎上。炎上フェニックスは射程2の遠距離攻撃持ちだ。間合いに気をつけろ。",
    heights: ["011012321","001001221","010100121","000010010","010100121","001001221","011012321"],
    obstacles: [[3, 3], [5, 1], [5, 5], [7, 0], [7, 6]],
    enemies: [["phoenix", 5, 2], ["phoenix", 5, 4], ["golem", 7, 3]] },
  { name: "最終章 マンネリ魔王城", deco: "🕯️",
    intro: "すべての創作者の宿敵、マンネリ大魔王。学んだスキルのすべてをぶつけろ。",
    heights: ["001122332","000112332","000011232","000001123","000011232","000112332","001122332"],
    obstacles: [[3, 1], [3, 5], [6, 2], [6, 4]],
    enemies: [["beast", 5, 1], ["phoenix", 5, 5], ["golem", 6, 3], ["king", 8, 3]] },
];

/* ============================================================
   アイソメトリック座標
============================================================ */
const TILE_W = 92, TILE_H = 46, SIDE = 16, DEPTH = 14;
const PAD_X = (800 - (COLS + ROWS - 2) * (TILE_W / 2) - TILE_W) / 2;
const PAD_Y = 108;

function heightAt(x, y) {
  const st = battle.stage;
  let h = Number(st.heights[y][x]);
  if (isObstacle(x, y)) h += 1;
  return h;
}
function tilePos(x, y) {
  return {
    sx: PAD_X + (x - y + ROWS - 1) * (TILE_W / 2),
    sy: PAD_Y + (x + y) * (TILE_H / 2) - heightAt(x, y) * DEPTH,
  };
}

/* ============================================================
   セーブ
============================================================ */
const SAVE_KEY = "mangaTacticsRPG_v1";
let save = loadSave() || { cleared: 0, level: 1, qIdx: {} };
function loadSave() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return null;
    const s = JSON.parse(raw);
    if (!s || typeof s.level !== "number") return null;
    return s;
  } catch { return null; }
}
function persist() { localStorage.setItem(SAVE_KEY, JSON.stringify(save)); }

/* ============================================================
   ユーティリティ
============================================================ */
const $ = id => document.getElementById(id);
const sleep = ms => new Promise(r => setTimeout(r, ms));
const dist = (a, b) => Math.abs(a.x - b.x) + Math.abs(a.y - b.y);
const key = (x, y) => x + "," + y;
function rand(n) { return Math.floor(Math.random() * n); }
function toast(msg) {
  const el = document.createElement("div");
  el.className = "toast";
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2100);
}
function getQuiz(subId) {
  const bank = QUIZ[subId];
  const i = (save.qIdx[subId] || 0) % bank.length;
  save.qIdx[subId] = i + 1;
  persist();
  return bank[i];
}

/* ============================================================
   バトル状態
============================================================ */
let battle = null;
let tileEls = {};
let spriteEls = {};

function allyPower() { return save.level - 1; }
function allyMaxHp(u) { return u.baseHp + (save.level - 1) * 4; }

function startStage(idx) {
  const stg = STAGES[idx];
  const units = PARTY.map((p, i) => ({
    ...p, x: ALLY_START[i][0], y: ALLY_START[i][1],
    maxHp: allyMaxHp(p), hp: allyMaxHp(p), acted: false, alive: true, isAlly: true,
  }));
  const hpBonus = idx * 3, atkBonus = Math.floor(idx / 2);
  const enemies = stg.enemies.map(([t, x, y], i) => {
    const base = ENEMY_TYPES[t];
    return {
      ...base, id: "e" + i, x, y,
      maxHp: base.hp + hpBonus, hp: base.hp + hpBonus, atk: base.atk + atkBonus,
      alive: true, isAlly: false,
    };
  });
  battle = {
    stageIdx: idx, stage: stg, units, enemies,
    turn: 1, phase: "player", busy: false,
    sel: null, mode: "idle", moveSet: new Set(), targets: new Set(), ability: null,
    log: [],
  };
  blog("🏁 " + stg.name + " ── " + stg.intro);
  $("screen-select").style.display = "none";
  $("screen-battle").style.display = "block";
  buildScene();
  render();
  showBanner(stg.name, "BATTLE START", false);
}

function blog(msg) {
  if (!battle) return;
  battle.log.unshift(msg);
  if (battle.log.length > 30) battle.log.length = 30;
}

function unitAt(x, y) {
  return battle.units.find(u => u.alive && u.x === x && u.y === y) ||
         battle.enemies.find(e => e.alive && e.x === x && e.y === y) || null;
}
function isObstacle(x, y) {
  return battle.stage.obstacles.some(([ox, oy]) => ox === x && oy === y);
}
function inBounds(x, y) { return x >= 0 && x < COLS && y >= 0 && y < ROWS; }

function reachable(unit, moveRange) {
  const seen = new Set([key(unit.x, unit.y)]);
  const queue = [[unit.x, unit.y, 0]];
  const result = new Set([key(unit.x, unit.y)]);
  while (queue.length) {
    const [x, y, d] = queue.shift();
    if (d >= moveRange) continue;
    for (const [dx, dy] of [[1,0],[-1,0],[0,1],[0,-1]]) {
      const nx = x + dx, ny = y + dy, k = key(nx, ny);
      if (!inBounds(nx, ny) || isObstacle(nx, ny) || seen.has(k)) continue;
      if (unitAt(nx, ny)) continue;
      seen.add(k);
      result.add(k);
      queue.push([nx, ny, d + 1]);
    }
  }
  return result;
}

/* ============================================================
   シーン構築（章開始時に1回）
============================================================ */
function buildScene() {
  const scene = $("scene");
  scene.className = "scene theme-" + battle.stageIdx;
  scene.innerHTML =
    '<div class="cloud c1"></div><div class="cloud c2"></div>' +
    '<div class="stars"></div><div class="glow"></div>';
  tileEls = {}; spriteEls = {};

  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) {
      const { sx, sy } = tilePos(x, y);
      const h = heightAt(x, y);
      const t = document.createElement("div");
      t.className = "tile alt" + ((x + y) % 2);
      t.style.left = sx + "px";
      t.style.top = sy + "px";
      t.style.zIndex = (x + y) * 10;
      const sideH = SIDE + h * DEPTH;
      t.innerHTML =
        `<div class="face faceL" style="height:${sideH}px"></div>` +
        `<div class="face faceR" style="height:${sideH}px"></div>` +
        `<div class="top"><div class="inner"></div></div>` +
        `<div class="hl"></div>` +
        (isObstacle(x, y) ? `<div class="deco">${battle.stage.deco}</div>` : "");
      t.querySelector(".top").addEventListener("click", () => onTileClick(x, y));
      scene.appendChild(t);
      tileEls[key(x, y)] = t;
    }
  }

  [...battle.units, ...battle.enemies].forEach(u => {
    const sp = document.createElement("div");
    sp.className = "sprite " + (u.isAlly ? "ally" : "foe") + (u.boss ? " boss" : "");
    sp.innerHTML =
      `<div class="ring"></div><div class="chara">${u.emoji}</div>` +
      `<div class="hp"><i style="width:100%"></i></div>`;
    scene.appendChild(sp);
    spriteEls[u.id] = sp;
  });
}

/* ============================================================
   描画更新
============================================================ */
function render() {
  $("bt-name").textContent = battle.stage.name;
  $("bt-turn").textContent = battle.turn;
  $("hd-level").textContent = save.level;
  $("hd-cleared").textContent = save.cleared;

  // スプライト
  [...battle.units, ...battle.enemies].forEach(u => {
    const sp = spriteEls[u.id];
    if (!sp) return;
    if (!u.alive) { sp.classList.add("dead"); return; }
    const { sx, sy } = tilePos(u.x, u.y);
    sp.style.left = sx + "px";
    sp.style.top = (sy - 42) + "px";
    sp.style.zIndex = (u.x + u.y) * 10 + 5;
    sp.classList.toggle("acted", !!(u.isAlly && u.acted && battle.phase === "player"));
    sp.querySelector(".hp i").style.width = Math.max(0, (u.hp / u.maxHp) * 100) + "%";
  });

  // ハイライト
  for (const k in tileEls) {
    const t = tileEls[k];
    t.classList.remove("move", "target", "sel");
    if (battle.mode === "move" && battle.moveSet.has(k)) t.classList.add("move");
    if (battle.mode === "target" && battle.targets.has(k)) t.classList.add("target");
    if (battle.sel && k === key(battle.sel.x, battle.sel.y)) t.classList.add("sel");
  }

  renderPanels();
  $("blog").innerHTML = battle.log.map(m => `<p>${m}</p>`).join("");
}

function renderPanels() {
  const cmd = $("cmd-body");
  const stat = $("stat-body");
  cmd.innerHTML = "";

  // ユニットパネル
  if (battle.sel) {
    const u = battle.sel;
    stat.innerHTML =
      `<div class="stat-flex">` +
      `<div class="portrait"><span>${u.emoji}</span></div>` +
      `<div class="stat-body">` +
      `<span class="uname">${u.name}</span>　<span class="ujob">${u.title}</span>` +
      `<div class="hp-line">HP <div class="hp-track"><i style="width:${(u.hp/u.maxHp)*100}%"></i></div> <b>${u.hp}</b>/${u.maxHp}</div>` +
      `移動 <b>${u.move}</b>　部隊Lv <b>${save.level}</b><br>` +
      `${u.intro}</div></div>`;
  } else {
    stat.innerHTML = `<div class="hint">` +
      battle.units.filter(u => u.alive).map(u =>
        `${u.emoji} <b style="color:var(--ivory)">${u.name}</b>（${u.title}）HP ${u.hp}/${u.maxHp}${u.acted ? "・行動済" : ""}`
      ).join("<br>") + `</div>`;
  }

  // コマンドパネル
  if (battle.phase !== "player") {
    cmd.innerHTML = `<div class="hint">敵軍が動いている…</div>`;
    return;
  }
  if (!battle.sel) {
    cmd.innerHTML = `<div class="hint">味方ユニット（🧠 👀 🖌️）をクリックすると移動範囲が光る。<br>水色のマス＝移動可能。移動先を選んだら技を選択しよう。</div>`;
    return;
  }
  if (battle.mode === "move") {
    cmd.innerHTML = `<div class="hint">水色のマスをクリックで移動。<br>今いるマスをクリックすれば、その場で行動できる。</div>`;
    return;
  }
  if (battle.mode === "action" || battle.mode === "target") {
    battle.sel.abilities.forEach(aid => {
      const a = ABILITIES[aid];
      const b = document.createElement("button");
      b.className = "menu-item" + (a.type === "heal" ? " heal-type" : "");
      b.innerHTML = `${a.type === "heal" ? "✚" : "⚔"} ${a.name}　` +
        `<small>【${SKILL_NAMES[aid]}】射程${a.range}・威力${a.power + allyPower()}${a.type === "heal" ? "・回復" : ""}</small>`;
      b.addEventListener("click", () => chooseAbility(aid));
      cmd.appendChild(b);
    });
    const w = document.createElement("button");
    w.className = "menu-item gray";
    w.textContent = "■ 待機";
    w.addEventListener("click", () => finishUnit(battle.sel));
    cmd.appendChild(w);
    if (battle.mode === "target") {
      const hint = document.createElement("div");
      hint.className = "hint";
      hint.textContent = "赤く光るマスの相手をクリック！（別の技を押せば切り替え）";
      cmd.appendChild(hint);
    }
  }
}

/* ============================================================
   演出
============================================================ */
function showBanner(main, sub, red) {
  const scene = $("scene");
  const old = scene.querySelector(".banner");
  if (old) old.remove();
  const b = document.createElement("div");
  b.className = "banner" + (red ? " red" : "");
  b.innerHTML = `<span class="btext">${main}<small>${sub || ""}</small></span>`;
  scene.appendChild(b);
  setTimeout(() => b.remove(), 1600);
}

function floatText(x, y, text, cls) {
  const { sx, sy } = tilePos(x, y);
  const el = document.createElement("span");
  el.className = "dmg-float " + (cls || "");
  el.textContent = text;
  el.style.left = sx + "px";
  el.style.top = (sy - 50) + "px";
  $("scene").appendChild(el);
  setTimeout(() => el.remove(), 1000);
}

function hitFlash(target) {
  const sp = spriteEls[target.id];
  if (!sp) return;
  sp.classList.remove("hit");
  void sp.offsetWidth;
  sp.classList.add("hit");
  const scene = $("scene");
  scene.classList.remove("shake");
  void scene.offsetWidth;
  scene.classList.add("shake");
}

/* ============================================================
   プレイヤー操作
============================================================ */
function onTileClick(x, y) {
  if (!battle || battle.phase !== "player" || battle.busy) return;
  const clicked = unitAt(x, y);

  if (battle.mode === "idle") {
    if (clicked && clicked.isAlly && !clicked.acted) {
      battle.sel = clicked;
      battle.mode = "move";
      battle.moveSet = reachable(clicked, clicked.move);
      render();
    }
    return;
  }

  if (battle.mode === "move") {
    if (battle.moveSet.has(key(x, y)) && (!clicked || clicked === battle.sel)) {
      battle.sel.x = x; battle.sel.y = y;
      battle.mode = "action";
      battle.moveSet = new Set();
      render();
    } else if (clicked && clicked.isAlly && !clicked.acted && clicked !== battle.sel) {
      battle.sel = clicked;
      battle.moveSet = reachable(clicked, clicked.move);
      render();
    } else {
      battle.sel = null; battle.mode = "idle"; battle.moveSet = new Set();
      render();
    }
    return;
  }

  if (battle.mode === "target") {
    if (battle.targets.has(key(x, y)) && clicked) {
      const a = ABILITIES[battle.ability];
      const valid = a.type === "heal" ? clicked.isAlly : !clicked.isAlly;
      if (valid) { openBattleQuiz(battle.sel, battle.ability, clicked); return; }
    }
    battle.mode = "action"; battle.targets = new Set(); battle.ability = null;
    render();
  }
}

function chooseAbility(aid) {
  const a = ABILITIES[aid];
  const u = battle.sel;
  const targets = new Set();
  const pool = a.type === "heal" ? battle.units : battle.enemies;
  pool.forEach(t => {
    if (!t.alive) return;
    const d = dist(u, t);
    const min = a.type === "heal" ? 0 : 1;
    if (d >= min && d <= a.range) targets.add(key(t.x, t.y));
  });
  if (targets.size === 0) {
    toast("射程内に対象がいない");
    return;
  }
  battle.ability = aid;
  battle.targets = targets;
  battle.mode = "target";
  render();
}

function finishUnit(u) {
  u.acted = true;
  battle.sel = null; battle.mode = "idle";
  battle.targets = new Set(); battle.moveSet = new Set(); battle.ability = null;
  render();
  if (battle.units.filter(x => x.alive && !x.acted).length === 0) enemyPhase();
}

/* ============================================================
   クイズ（バトル・道場）
============================================================ */
let pending = null;
let quizDone = false;

function openBattleQuiz(unit, aid, target) {
  pending = { unit, aid, target };
  const a = ABILITIES[aid];
  openQuiz(
    (a.type === "heal" ? "✚ " : "⚔ ") + a.name,
    "【" + SKILL_NAMES[aid] + "】正解で会心の" + (a.type === "heal" ? "回復" : "一撃"),
    getQuiz(aid)
  );
}

function openDojoQuiz() {
  pending = null;
  const ids = Object.keys(QUIZ);
  const sid = ids[rand(ids.length)];
  openQuiz("道場 ─ 自由修行", "【" + SKILL_NAMES[sid] + "】の知識", getQuiz(sid));
}

function openQuiz(title, tag, q) {
  quizDone = false;
  $("quiz-title").textContent = title;
  $("quiz-skill").textContent = tag;
  $("quiz-q").textContent = q.q;
  const box = $("quiz-choices");
  box.innerHTML = "";
  const order = q.choices.map((_, i) => i).sort(() => Math.random() - 0.5);
  order.forEach(i => {
    const b = document.createElement("button");
    b.className = "choice-btn";
    b.textContent = q.choices[i];
    b.addEventListener("click", () => onQuizAnswer(b, i === q.answer, q, box));
    box.appendChild(b);
  });
  $("quiz-explain").style.display = "none";
  $("quiz-close").style.display = "none";
  $("quiz-modal").classList.add("show");
}

function onQuizAnswer(btn, correct, q, box) {
  if (quizDone) return;
  quizDone = true;
  [...box.children].forEach(b => { b.disabled = true; });
  btn.classList.add(correct ? "correct" : "wrong");
  if (!correct) {
    [...box.children].forEach(b => {
      if (b.textContent === q.choices[q.answer]) b.classList.add("correct");
    });
  }

  let head;
  if (pending) {
    const { unit, aid, target } = pending;
    const a = ABILITIES[aid];
    const base = a.power + allyPower();
    const mult = correct ? 1.5 : 0.6;
    const amount = Math.max(1, Math.round(base * mult) + rand(3) - 1);
    if (a.type === "heal") {
      target.hp = Math.min(target.maxHp, target.hp + amount);
      head = correct ? `会心の回復！ ${target.name}のHPが ${amount} 回復！`
                     : `おしい…回復は ${amount} にとどまった。だが学びは得た。`;
      blog(`✚ ${unit.name}の${a.name}！ ${target.name}を${amount}回復${correct ? "（会心）" : ""}`);
      pending.result = { amount, heal: true, correct };
    } else {
      target.hp -= amount;
      head = correct ? `会心の一撃！ ${target.name}に ${amount} ダメージ！`
                     : `おしい…攻撃が浅い。${target.name}に ${amount} ダメージ。だが学びは得た。`;
      blog(`⚔ ${unit.name}の${a.name}！ ${target.name}に${amount}ダメージ${correct ? "（会心）" : ""}`);
      if (target.hp <= 0) {
        target.alive = false;
        blog(`💥 ${target.name}を倒した！`);
        head += ` ${target.name}を倒した！`;
      }
      pending.result = { amount, heal: false, correct };
    }
  } else {
    head = correct ? "正解！ 知識が身についた。" : "おしい！ だが解説で学べたからよし。";
  }

  const ex = $("quiz-explain");
  ex.innerHTML = `<div class="head">${correct ? "🎉 " : "💦 "}${head}</div>` + q.exp;
  ex.style.display = "block";
  $("quiz-close").style.display = "inline-block";
}

$("quiz-close").addEventListener("click", () => {
  $("quiz-modal").classList.remove("show");
  if (!pending) return;
  const { unit, target, result } = pending;
  pending = null;
  render();
  hitFlash(target);
  floatText(target.x, target.y, (result.heal ? "+" : "") + result.amount,
    result.heal ? "heal" : (result.correct ? "crit" : ""));
  if (battle.enemies.every(e => !e.alive)) { setTimeout(victory, 700); battle.busy = true; return; }
  finishUnit(unit);
});

/* ============================================================
   エネミーフェイズ
============================================================ */
async function enemyPhase() {
  battle.phase = "enemy";
  battle.busy = true;
  battle.sel = null; battle.mode = "idle";
  render();
  showBanner("ENEMY PHASE", "敵軍フェイズ", true);
  await sleep(1100);

  for (const e of battle.enemies) {
    if (!e.alive) continue;
    const allies = battle.units.filter(u => u.alive);
    if (allies.length === 0) break;

    let target = allies[0];
    for (const u of allies) if (dist(e, u) < dist(e, target)) target = u;

    if (dist(e, target) > e.range) {
      const tiles = reachable(e, e.move);
      let best = { x: e.x, y: e.y }, bestD = dist(e, target);
      tiles.forEach(k => {
        const [tx, ty] = k.split(",").map(Number);
        const d = Math.abs(tx - target.x) + Math.abs(ty - target.y);
        if (d < bestD) { bestD = d; best = { x: tx, y: ty }; }
      });
      if (best.x !== e.x || best.y !== e.y) {
        e.x = best.x; e.y = best.y;
        render();
        await sleep(420);
      }
    }

    if (dist(e, target) <= e.range) {
      const dmg = Math.max(1, e.atk + rand(3) - 1);
      target.hp -= dmg;
      blog(`👿 ${e.name}の攻撃！ ${target.name}に${dmg}ダメージ`);
      render();
      hitFlash(target);
      floatText(target.x, target.y, dmg, "");
      await sleep(520);
      if (target.hp <= 0) {
        target.alive = false;
        blog(`😵 ${target.name}が倒れた…！`);
        render();
        await sleep(380);
        if (battle.units.every(u => !u.alive)) { defeat(); return; }
      }
    }
  }

  battle.turn += 1;
  battle.phase = "player";
  battle.busy = false;
  battle.units.forEach(u => { u.acted = false; });
  blog(`── TURN ${battle.turn} ──`);
  render();
  showBanner("PLAYER PHASE", "自軍フェイズ", false);
}

/* ============================================================
   勝敗
============================================================ */
let resultAction = null;

function victory() {
  battle.busy = true;
  const idx = battle.stageIdx;
  const wasCleared = idx < save.cleared;
  const isFinal = idx === STAGES.length - 1;
  if (!wasCleared) save.cleared = Math.max(save.cleared, idx + 1);
  const before = save.level;
  if (save.level < 10) save.level += 1;
  persist();

  $("res-big").textContent = "─ 勝利 ─";
  $("res-body").innerHTML =
    `${battle.stage.name} を制覇した。<br>` +
    (save.level > before ? `部隊レベルが <b>Lv.${save.level}</b> に上がった！（HP・威力アップ）<br>` : "部隊はすでに最大レベルだ。<br>") +
    (isFinal ? "" : "次の章へ進もう。");
  resultAction = () => {
    if (isFinal && !wasCleared) { showEnding(); return; }
    backToSelect();
  };
  $("result-modal").classList.add("show");
}

function defeat() {
  battle.busy = true;
  $("res-big").textContent = "─ 敗北 ─";
  $("res-body").innerHTML =
    "部隊は撤退した…。だが、学んだ知識は失われない。<br>" +
    "クイズに正解して会心の一撃を重ねるのが勝利のコツだ。もう一度挑もう。";
  resultAction = backToSelect;
  $("result-modal").classList.add("show");
}

function showEnding() {
  $("res-big").textContent = "─ 完 ─";
  $("res-body").innerHTML =
    "マンネリ大魔王は砕け散り、世界に物語が還ってきた。<br><br>" +
    "あなたの部隊は<b>「設計する力」「読ませる力」「仕上げる力」</b>のすべてを修めた。<br>" +
    "編集部から一通の手紙が届く──「ぜひ、うちで連載を」。<br><br>" +
    "🎉 おめでとう。ここで学んだ知識を、本物のマンガ制作で振るう時だ。<br>" +
    "（道場ではいつでも復習できる）";
  resultAction = backToSelect;
  $("result-modal").classList.add("show");
}

$("res-close").addEventListener("click", () => {
  $("result-modal").classList.remove("show");
  const fn = resultAction;
  resultAction = null;
  if (fn) fn();
});

function backToSelect() {
  battle = null;
  $("screen-battle").style.display = "none";
  $("screen-select").style.display = "block";
  renderSelect();
}

/* ============================================================
   ステージ選択画面
============================================================ */
const THUMB_BG = [
  "linear-gradient(160deg,#a8cfe8,#ead9b0)",
  "linear-gradient(160deg,#3c6b58,#6f9468)",
  "linear-gradient(160deg,#f0a35e,#9c4a4a)",
  "linear-gradient(160deg,#6e2222,#b8452a)",
  "linear-gradient(160deg,#1e1a3e,#3a2a5c)",
];

function renderSelect() {
  $("hd-level").textContent = save.level;
  $("hd-cleared").textContent = save.cleared;

  const list = $("stage-list");
  list.innerHTML = "";
  STAGES.forEach((stg, i) => {
    const locked = i > save.cleared;
    const done = i < save.cleared;
    const card = document.createElement("div");
    card.className = "stage-card" + (locked ? " locked" : "");
    card.innerHTML =
      `<div class="stage-thumb" style="background:${THUMB_BG[i]}">${locked ? "🔒" : stg.deco}</div>` +
      `<div class="stage-body">` +
      `<div class="sname">${done ? '<span class="clear-mark">★</span>' : ""}${stg.name}</div>` +
      `<div class="sinfo">${stg.intro}<br>敵：${stg.enemies.map(([t]) => ENEMY_TYPES[t].emoji + ENEMY_TYPES[t].name).join("、")}</div>` +
      `</div>`;
    const btn = document.createElement("button");
    btn.className = "gbtn";
    btn.textContent = locked ? "未開放" : (done ? "再出撃" : "出撃");
    btn.disabled = locked;
    if (!locked) btn.addEventListener("click", () => startStage(i));
    card.appendChild(btn);
    list.appendChild(card);
  });

  const party = $("party-row");
  party.innerHTML = "";
  PARTY.forEach(p => {
    const chip = document.createElement("div");
    chip.className = "party-chip";
    chip.innerHTML =
      `<div class="portrait"><span>${p.emoji}</span></div>` +
      `<div><span class="pname">${p.name}</span>　<span class="pjob">${p.title}</span><br>` +
      `HP ${p.baseHp + (save.level - 1) * 4}　移動 ${p.move}<br>` +
      `技：${p.abilities.map(a => ABILITIES[a].name).join("／")}<br>${p.intro}</div>`;
    party.appendChild(chip);
  });
}

/* ============================================================
   ボタン
============================================================ */
$("btn-dojo").addEventListener("click", openDojoQuiz);

$("btn-endturn").addEventListener("click", () => {
  if (!battle || battle.phase !== "player" || battle.busy) return;
  battle.units.forEach(u => { if (u.alive) u.acted = true; });
  battle.sel = null; battle.mode = "idle";
  enemyPhase();
});

$("btn-retreat").addEventListener("click", () => {
  if (!battle || battle.busy) return;
  if (confirm("撤退する？（この章の進行はリセットされる）")) backToSelect();
});

$("btn-reset").addEventListener("click", () => {
  if (confirm("ほんとうに最初からやり直す？（レベル・進行が消える）")) {
    save = { cleared: 0, level: 1, qIdx: {} };
    persist();
    renderSelect();
    toast("新しい物語がはじまった");
  }
});

/* ============================================================
   起動
============================================================ */
renderSelect();
</script>
